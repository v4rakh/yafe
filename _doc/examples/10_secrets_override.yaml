# Step-level secrets overriding flow-level
# Demonstrates: step secrets override flow secrets with same name
runs-on: host
secrets:
  - name: token
    from:
      env: FLOW_TOKEN

steps:
  - name: use-flow-token
    cmd: |
      echo "Flow token: ${{ secrets.token }}"
    kind: shell

  - name: use-step-token
    kind: shell
    secrets:
      - name: token
        from:
          env: STEP_TOKEN
    cmd: |
      echo "Step token (overridden): ${{ secrets.token }}"
