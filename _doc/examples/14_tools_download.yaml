# Tools download
# Demonstrates: downloading a tool binary with checksum verification
# Note: This example downloads jq from GitHub releases
runs-on: host
tools:
  - name: jq
    url: https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
    sha256: 5942c9b0934e510ee61eb3e30273f1b3fe2590df93933a93d7c58b81d19c8ff5
steps:
  - cmd: |
      echo '{"greeting": "hello", "target": "world"}' | jq -r '.greeting + " " + .target'
    kind: shell
